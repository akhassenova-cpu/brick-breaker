<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRICK BREAKER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --grid: rgba(30,60,120,0.12);
    --accent: #00f0ff;
    --accent2: #ff2d6b;
    --accent3: #ffe600;
    --paddle: #00f0ff;
    --ball: #ffffff;
    --ui: #7ec8e3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.18em;
    color: var(--accent);
    text-shadow: 0 0 18px var(--accent), 0 0 40px rgba(0,240,255,0.3);
    margin-bottom: 6px;
    z-index: 1;
  }

  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: var(--ui);
    z-index: 1;
  }

  #hud span { color: white; }

  #game-wrap {
    position: relative;
    z-index: 1;
    border: 1px solid rgba(0,240,255,0.25);
    box-shadow: 0 0 30px rgba(0,240,255,0.1), inset 0 0 30px rgba(0,0,0,0.4);
  }

  canvas {
    display: block;
    background: transparent;
  }

  #msg {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,8,16,0.88);
    z-index: 10;
    gap: 16px;
  }

  #msg h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.15em;
    color: var(--accent3);
    text-shadow: 0 0 20px var(--accent3);
  }

  #msg p {
    color: var(--ui);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 1.8;
  }

  #msg button {
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    padding: 10px 32px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 10px rgba(0,240,255,0.2);
  }

  #msg button:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 24px rgba(0,240,255,0.5);
  }

  #footer {
    margin-top: 10px;
    color: rgba(126,200,227,0.35);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    z-index: 1;
  }
</style>
</head>
<body>

<h1>BRICK BREAKER</h1>
<div id="hud">
  <div>SCORE: <span id="score-val">0</span></div>
  <div>LEVEL: <span id="level-val">1</span></div>
  <div>LIVES: <span id="lives-val">3</span></div>
</div>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="msg">
    <h2>BRICK BREAKER</h2>
    <p>Move mouse or use ← → arrow keys to control the paddle<br>Break all the bricks to advance</p>
    <button id="startBtn">START GAME</button>
  </div>
</div>
<div id="footer">MOVE MOUSE / ← → KEYS &nbsp;|&nbsp; CLICK OR PRESS SPACE TO LAUNCH</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('msg');
const msgH2 = msg.querySelector('h2');
const msgP = msg.querySelector('p');
const msgBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('score-val');
const levelEl = document.getElementById('level-val');
const livesEl = document.getElementById('lives-val');

// Responsive sizing
function resize() {
  const maxW = Math.min(window.innerWidth - 32, 520);
  const maxH = Math.min(window.innerHeight - 180, 600);
  const ratio = 520 / 600;
  let W = maxW, H = maxW / ratio;
  if (H > maxH) { H = maxH; W = H * ratio; }
  canvas.width = Math.floor(W);
  canvas.height = Math.floor(H);
}
resize();
window.addEventListener('resize', () => { resize(); if (!running) draw(); });

// --- Game state ---
let W, H, ROWS, COLS, BW, BH, BPAD, BOFFX, BOFFY;
let paddle, ball, bricks, score, level, lives, running, launched, animId;
let keys = {};

const COLORS = ['#ff2d6b','#ff7c1e','#ffe600','#39ff14','#00f0ff','#a855f7'];

function setup(lvl) {
  W = canvas.width; H = canvas.height;
  ROWS = 4 + Math.min(lvl - 1, 4);
  COLS = 8;
  BPAD = Math.floor(W * 0.012);
  BOFFX = Math.floor(W * 0.03);
  BOFFY = Math.floor(H * 0.06);
  BW = (W - BOFFX * 2 - BPAD * (COLS - 1)) / COLS;
  BH = Math.floor(H * 0.042);

  const pw = Math.floor(W * 0.18);
  const ph = Math.floor(H * 0.022);
  paddle = { x: W / 2 - pw / 2, y: H - Math.floor(H * 0.07), w: pw, h: ph, speed: W * 0.012 };

  const br = Math.floor(W * 0.013);
  const bspeed = W * (0.006 + lvl * 0.0008);
  ball = { x: W / 2, y: paddle.y - br - 2, r: br, dx: bspeed, dy: -bspeed, onPaddle: true };

  bricks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const hp = r < 2 ? 1 : (r < 4 ? 2 : 3);
      bricks.push({
        x: BOFFX + c * (BW + BPAD),
        y: BOFFY + r * (BH + BPAD),
        w: BW, h: BH,
        hp, maxHp: hp,
        color: COLORS[r % COLORS.length],
        alive: true
      });
    }
  }
}

function resetBall() {
  const br = ball.r;
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - br - 2;
  ball.onPaddle = true;
}

// --- Input ---
document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  paddle.x = mx - paddle.w / 2;
  clampPaddle();
  if (ball.onPaddle) ball.x = paddle.x + paddle.w / 2;
});

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'ArrowUp') && ball.onPaddle && running) launch();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('click', () => { if (ball.onPaddle && running) launch(); });

function clampPaddle() {
  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;
}

function launch() {
  ball.onPaddle = false;
  ball.dx = (Math.random() > 0.5 ? 1 : -1) * Math.abs(ball.dx);
  ball.dy = -Math.abs(ball.dy);
}

// --- Particles ---
let particles = [];
function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, color, size: 2 + Math.random() * 3
    });
  }
}

// --- Drawing ---
function drawBg() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(5,8,16,0.96)';
  ctx.fillRect(0, 0, W, H);
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    const fade = b.hp / b.maxHp;
    ctx.save();
    ctx.globalAlpha = 0.4 + 0.6 * fade;
    // Glow
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8 * fade;
    // Fill
    ctx.fillStyle = b.color + Math.floor(fade * 80 + 60).toString(16).padStart(2,'0');
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Top highlight
    ctx.globalAlpha = 0.18 * fade;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 3);
    ctx.restore();
    // HP pips for multi-hit
    if (b.maxHp > 1) {
      for (let i = 0; i < b.hp; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillRect(b.x + b.w - 8 - i * 7, b.y + b.h - 5, 5, 3);
      }
    }
  });
}

function drawPaddle() {
  ctx.save();
  ctx.shadowColor = '#00f0ff';
  ctx.shadowBlur = 16;
  const grad = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.w, 0);
  grad.addColorStop(0, 'rgba(0,240,255,0.7)');
  grad.addColorStop(0.5, '#00f0ff');
  grad.addColorStop(1, 'rgba(0,240,255,0.7)');
  ctx.fillStyle = grad;
  const r = paddle.h / 2;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, r);
  ctx.fill();
  ctx.restore();
}

function drawBall() {
  ctx.save();
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, 1, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, 'rgba(200,240,255,0.8)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  });
}

function draw() {
  W = canvas.width; H = canvas.height;
  drawBg();
  drawBricks();
  drawParticles();
  drawPaddle();
  drawBall();
}

// --- Collision ---
function rectBallCollide(b) {
  const nearX = Math.max(b.x, Math.min(ball.x, b.x + b.w));
  const nearY = Math.max(b.y, Math.min(ball.y, b.y + b.h));
  const dx = ball.x - nearX, dy = ball.y - nearY;
  return dx * dx + dy * dy < ball.r * ball.r;
}

function update() {
  W = canvas.width; H = canvas.height;

  // Keyboard paddle
  if (keys['ArrowLeft']) { paddle.x -= paddle.speed; clampPaddle(); }
  if (keys['ArrowRight']) { paddle.x += paddle.speed; clampPaddle(); }

  if (ball.onPaddle) {
    ball.x = paddle.x + paddle.w / 2;
    return;
  }

  // Move ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounce
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

  // Paddle collision
  if (ball.dy > 0 &&
      ball.x > paddle.x && ball.x < paddle.x + paddle.w &&
      ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + Math.abs(ball.dy) + 2) {
    ball.y = paddle.y - ball.r;
    // Angle based on hit position
    const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    const angle = hit * (Math.PI / 3);
    const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    ball.dx = speed * Math.sin(angle);
    ball.dy = -speed * Math.cos(angle);
  }

  // Fell off
  if (ball.y - ball.r > H) {
    lives--;
    livesEl.textContent = lives;
    if (lives <= 0) {
      endGame(false);
      return;
    }
    resetBall();
    return;
  }

  // Brick collision
  let hitAny = false;
  for (let b of bricks) {
    if (!b.alive) continue;
    if (rectBallCollide(b)) {
      if (!hitAny) {
        // Determine bounce direction
        const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
        const overlapX = (ball.r + b.w / 2) - Math.abs(ball.x - cx);
        const overlapY = (ball.r + b.h / 2) - Math.abs(ball.y - cy);
        if (overlapX < overlapY) ball.dx *= -1;
        else ball.dy *= -1;
        hitAny = true;
      }
      b.hp--;
      score += 10 * level;
      scoreEl.textContent = score;
      spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);
      if (b.hp <= 0) { b.alive = false; score += 5 * level; scoreEl.textContent = score; }
    }
  }

  // Update particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.03;
  });
  particles = particles.filter(p => p.life > 0);

  // Check win
  if (bricks.every(b => !b.alive)) {
    level++;
    levelEl.textContent = level;
    setup(level);
    running = false;
    msgH2.textContent = `LEVEL ${level - 1} CLEAR!`;
    msgP.innerHTML = `Score: ${score}<br>Get ready for level ${level}`;
    msgBtn.textContent = 'NEXT LEVEL';
    msg.style.display = 'flex';
  }
}

function gameLoop() {
  update();
  draw();
  if (running) animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0; level = 1; lives = 3;
  scoreEl.textContent = score;
  levelEl.textContent = level;
  livesEl.textContent = lives;
  setup(1);
  msg.style.display = 'none';
  running = true;
  cancelAnimationFrame(animId);
  gameLoop();
}

function continueLevel() {
  msg.style.display = 'none';
  running = true;
  cancelAnimationFrame(animId);
  gameLoop();
}

function endGame(win) {
  running = false;
  cancelAnimationFrame(animId);
  msgH2.textContent = win ? 'YOU WIN!' : 'GAME OVER';
  msgP.innerHTML = `Final Score: ${score}`;
  msgBtn.textContent = 'PLAY AGAIN';
  msgBtn.onclick = startGame;
  msg.style.display = 'flex';
  draw();
}

msgBtn.onclick = () => {
  if (msgBtn.textContent === 'NEXT LEVEL') continueLevel();
  else startGame();
};

// Initial draw
setup(1);
draw();
</script>
</body>
</html>
